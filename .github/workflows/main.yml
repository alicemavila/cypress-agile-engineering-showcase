name: Cypress E2E Tests 🚀

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies 📦
        run: npm install

      - name: Cypress run 🧪
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        env:
          # É AQUI que a mágica acontece: conectamos os Secrets do GitHub ao Cypress
          CYPRESS_userEmail: ${{ secrets.USER_EMAIL }}
          CYPRESS_userPassword: ${{ secrets.USER_PASSWORD }}
          CYPRESS_userName: ${{ secrets.USER_NAME }}

      - name: Upload Screenshots (on failure) 📸
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Video 🎥
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos